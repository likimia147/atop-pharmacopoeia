name: disk
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 5271 }
          - { version: 2260 }
          - { version: 8027 }
          - { version: 6394 }
          - { version: 2708 }
          - { version: 3047 }
          - { version: 612 }
          - { version: 7015 }
          - { version: 3525 }
          - { version: 3524 }
          - { version: 4321 }
          - { version: 3552 }
          - { version: 6168 }
          - { version: 4467 }
          - { version: 229 }
          - { version: 8969 }
          - { version: 5588 }
